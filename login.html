<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Move Up Fit</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ff4500'/><text y='.9em' font-size='80' x='10'>🏋</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        body {
            background: #0a0a0f;
            overflow: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,69,0,0.12) 0%, transparent 70%);
            top: -150px;
            right: -100px;
            animation: pulse 6s ease-in-out infinite;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,69,0,0.07) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: pulse 6s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        /* Grid lines */
        .grid-lines {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,69,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,69,0,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,69,0,0.1);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-login {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-login img {
            height: 60px;
            filter: drop-shadow(0 0 12px rgba(255,69,0,0.4));
        }

        .login-title {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 2rem;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #666;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            padding: 0.8rem 1rem;
            width: 100%;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #ff4500;
            background: rgba(255, 69, 0, 0.05);
            box-shadow: 0 0 0 3px rgba(255, 69, 0, 0.15);
        }

        .input-wrapper input::placeholder { color: #333; }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #ff4500, #cc3700);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-login:hover {
            box-shadow: 0 8px 25px rgba(255, 69, 0, 0.4);
            transform: translateY(-2px);
        }

        .btn-login:hover::before { opacity: 1; }
        .btn-login:active { transform: translateY(0); }

        .btn-login.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.82rem;
            margin-top: 0.5rem;
            display: none;
            padding: 0.6rem 0.8rem;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 6px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            margin: 1.5rem 0;
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #ff4500;
            font-size: 0.82rem;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }
        .forgot-link:hover { opacity: 0.75; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }

        .modal-box {
            background: #141418;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .modal-box h3 {
            color: #f0f0f0;
            font-size: 1rem;
            margin: 0 0 0.4rem;
        }
        .modal-box p {
            color: #666;
            font-size: 0.82rem;
            margin: 0 0 1.2rem;
        }
        .modal-box input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            padding: 0.8rem 1rem;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .modal-box input:focus {
            outline: none;
            border-color: #ff4500;
            box-shadow: 0 0 0 3px rgba(255,69,0,0.15);
        }
        .modal-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.2rem;
        }
        .btn-cancel {
            flex: 1;
            padding: 0.75rem;
            background: rgba(255,255,255,0.06);
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .btn-send {
            flex: 1;
            padding: 0.75rem;
            background: linear-gradient(135deg, #ff4500, #cc3700);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-send:hover { opacity: 0.85; }
        .modal-feedback {
            font-size: 0.82rem;
            margin-top: 0.75rem;
            padding: 0.6rem 0.8rem;
            border-radius: 6px;
            display: none;
        }
        .modal-feedback.success {
            color: #4caf50;
            background: rgba(76,175,80,0.1);
            border: 1px solid rgba(76,175,80,0.2);
        }
        .modal-feedback.error {
            color: #ff6b6b;
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.2);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-lines"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-login">
                <img src="assets/images/Move-Up.png" alt="Move Up Fit">
            </div>

            <p class="login-title">Acesso ao Sistema</p>

            <div class="divider"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
                    </div>
                </div>

                <div class="error-message" id="errorMessage"></div>

                <div class="form-group" style="margin-top: 1.5rem;">
                    <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
                </div>
            </form>

            <button class="forgot-link" onclick="abrirModalRecuperacao()">Esqueceu a senha?</button>
        </div>
    </div>

    <!-- Modal Recuperação de Senha -->
    <div class="modal-overlay" id="modalRecuperacao">
        <div class="modal-box">
            <h3>Recuperar senha</h3>
            <p>Informe seu email e enviaremos um link para redefinir sua senha.</p>
            <input type="email" id="emailRecuperacao" placeholder="seu@email.com" autocomplete="email">
            <div class="modal-feedback" id="modalFeedback"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fecharModalRecuperacao()">Cancelar</button>
                <button class="btn-send" id="btnEnviarReset" onclick="enviarRecuperacao()">Enviar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>
        // ─── EmailJS ───────────────────────────────────────────
        const EMAILJS_PUBLIC_KEY  = 'bW5KhfKtecBze9t_h';
        const EMAILJS_SERVICE_ID  = 'service_evrssdx';
        const EMAILJS_TEMPLATE_ID = 'template_qde119o';
        emailjs.init(EMAILJS_PUBLIC_KEY);
        // ───────────────────────────────────────────────────────
        function mostrarErro(mensagem) {
            const el = document.getElementById('errorMessage');
            el.textContent = mensagem;
            el.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            document.getElementById('errorMessage').style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            btn.classList.add('loading');
            btn.textContent = 'Entrando...';

            try {
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                const doc = await db.collection('usuarios').doc(userCredential.user.uid).get();
                if (doc.exists && doc.data().deveAlterarSenha) {
                    window.location.href = 'trocar-senha.html';
                } else {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                mostrarErro('Email ou senha incorretos');
                btn.classList.remove('loading');
                btn.textContent = 'Entrar';
            }
        });

        firebase.auth().onAuthStateChanged(function(user) {
            if (user) window.location.href = 'index.html';
        });

        function abrirModalRecuperacao() {
            document.getElementById('emailRecuperacao').value = '';
            document.getElementById('modalFeedback').style.display = 'none';
            document.getElementById('btnEnviarReset').disabled = false;
            document.getElementById('btnEnviarReset').textContent = 'Enviar';
            document.getElementById('modalRecuperacao').classList.add('active');
            setTimeout(() => document.getElementById('emailRecuperacao').focus(), 100);
        }

        function fecharModalRecuperacao() {
            document.getElementById('modalRecuperacao').classList.remove('active');
        }

        async function enviarRecuperacao() {
            const email = document.getElementById('emailRecuperacao').value.trim();
            const feedback = document.getElementById('modalFeedback');
            const btn = document.getElementById('btnEnviarReset');

            if (!email) {
                feedback.textContent = 'Informe um email válido.';
                feedback.className = 'modal-feedback error';
                feedback.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Enviando...';
            feedback.style.display = 'none';

            try {
                await firebase.auth().sendPasswordResetEmail(email);
                feedback.textContent = 'Email enviado! Verifique sua caixa de entrada.';
                feedback.className = 'modal-feedback success';
                feedback.style.display = 'block';
                btn.textContent = 'Enviado ✓';
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    feedback.textContent = 'Nenhuma conta encontrada com este email.';
                } else {
                    feedback.textContent = 'Não foi possível processar a solicitação.';
                }
                feedback.className = 'modal-feedback error';
                feedback.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Enviar';
            }
        }

        document.getElementById('modalRecuperacao').addEventListener('click', function(e) {
            if (e.target === this) fecharModalRecuperacao();
        });
    </script>
</body>
</html>
