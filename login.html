<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Move Up Fit</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        body {
            background: #0a0a0f;
            overflow: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,69,0,0.12) 0%, transparent 70%);
            top: -150px;
            right: -100px;
            animation: pulse 6s ease-in-out infinite;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,69,0,0.07) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: pulse 6s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }

        /* Grid lines */
        .grid-lines {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,69,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,69,0,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,69,0,0.1);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-login {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-login img {
            height: 60px;
            filter: drop-shadow(0 0 12px rgba(255,69,0,0.4));
        }

        .login-title {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 2rem;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #666;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #f0f0f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            padding: 0.8rem 1rem;
            width: 100%;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #ff4500;
            background: rgba(255, 69, 0, 0.05);
            box-shadow: 0 0 0 3px rgba(255, 69, 0, 0.15);
        }

        .input-wrapper input::placeholder { color: #333; }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #ff4500, #cc3700);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn-login:hover {
            box-shadow: 0 8px 25px rgba(255, 69, 0, 0.4);
            transform: translateY(-2px);
        }

        .btn-login:hover::before { opacity: 1; }
        .btn-login:active { transform: translateY(0); }

        .btn-login.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.82rem;
            margin-top: 0.5rem;
            display: none;
            padding: 0.6rem 0.8rem;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 6px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-lines"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-login">
                <img src="assets/images/Move Up.png" alt="Move Up Fit">
            </div>

            <p class="login-title">Acesso ao Sistema</p>

            <div class="divider"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
                    </div>
                </div>

                <div class="error-message" id="errorMessage"></div>

                <div class="form-group" style="margin-top: 1.5rem;">
                    <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        function mostrarErro(mensagem) {
            const el = document.getElementById('errorMessage');
            el.textContent = mensagem;
            el.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            document.getElementById('errorMessage').style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');

            btn.classList.add('loading');
            btn.textContent = 'Entrando...';

            try {
                await firebase.auth().signInWithEmailAndPassword(email, password);
                window.location.href = 'index.html';
            } catch (error) {
                mostrarErro('Email ou senha incorretos');
                btn.classList.remove('loading');
                btn.textContent = 'Entrar';
            }
        });

        firebase.auth().onAuthStateChanged(function(user) {
            if (user) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
