<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Nova Senha - Move Up Fit</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ff4500'/><text y='.9em' font-size='80' x='10'>🏋</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0a0a0f; overflow: hidden; }

        .bg-animation { position: fixed; inset: 0; z-index: 0; }
        .bg-animation::before {
            content: ''; position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,69,0,0.12) 0%, transparent 70%);
            top: -150px; right: -100px;
            animation: pulse 6s ease-in-out infinite;
        }
        .bg-animation::after {
            content: ''; position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,69,0,0.07) 0%, transparent 70%);
            bottom: -100px; left: -100px;
            animation: pulse 6s ease-in-out infinite reverse;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
        }
        .grid-lines {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,69,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,69,0,0.03) 1px, transparent 1px);
            background-size: 60px 60px; z-index: 0;
        }
        .login-container {
            position: relative; z-index: 1;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 1rem;
        }
        .login-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 2.5rem;
            width: 100%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,69,0,0.1);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .logo-login { text-align: center; margin-bottom: 1.5rem; }
        .logo-login img { height: 60px; filter: drop-shadow(0 0 12px rgba(255,69,0,0.4)); }

        .aviso-box {
            background: rgba(255,69,0,0.08);
            border: 1px solid rgba(255,69,0,0.25);
            border-radius: 10px; padding: 0.9rem 1rem;
            margin-bottom: 1.5rem; text-align: center;
        }
        .aviso-box p { color: #ff7043; font-size: 0.83rem; margin: 0; line-height: 1.5; }

        .login-title {
            text-align: center; font-size: 0.75rem; font-weight: 600;
            letter-spacing: 3px; text-transform: uppercase;
            color: #555; margin-bottom: 1.5rem;
        }
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            margin: 1.2rem 0;
        }
        .form-group label {
            font-size: 0.75rem; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase; color: #666;
        }
        .input-wrapper input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; color: #f0f0f0;
            font-family: 'Inter', sans-serif; font-size: 0.95rem;
            padding: 0.8rem 1rem; width: 100%; transition: all 0.2s;
        }
        .input-wrapper input:focus {
            outline: none; border-color: #ff4500;
            background: rgba(255,69,0,0.05);
            box-shadow: 0 0 0 3px rgba(255,69,0,0.15);
        }
        .input-wrapper input::placeholder { color: #333; }
        .btn-login {
            width: 100%; padding: 0.9rem;
            background: linear-gradient(135deg, #ff4500, #cc3700);
            color: white; border: none; border-radius: 10px;
            font-size: 0.9rem; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; cursor: pointer; transition: all 0.3s;
            font-family: 'Inter', sans-serif; margin-top: 0.5rem;
        }
        .btn-login:hover { box-shadow: 0 8px 25px rgba(255,69,0,0.4); transform: translateY(-2px); }
        .btn-login:disabled { opacity: 0.6; pointer-events: none; }
        .feedback {
            font-size: 0.82rem; margin-top: 0.75rem;
            padding: 0.6rem 0.8rem; border-radius: 6px; display: none;
        }
        .feedback.error { color: #ff6b6b; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.2); }
        .feedback.success { color: #4caf50; background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.2); }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-lines"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-login">
                <img src="assets/images/Move-Up.png" alt="Move Up Fit">
            </div>

            <p class="login-title">Criar Nova Senha</p>

            <div class="aviso-box">
                <p>🔐 O administrador solicitou a redefinição da sua senha.<br>Crie uma nova senha para continuar.</p>
            </div>

            <div class="divider"></div>

            <div class="form-group">
                <label for="novaSenha">Nova Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres" minlength="6" autocomplete="new-password">
                </div>
            </div>

            <div class="form-group" style="margin-top: 1rem;">
                <label for="confirmarSenha">Confirmar Nova Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmarSenha" placeholder="Repita a nova senha" minlength="6" autocomplete="new-password">
                </div>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="form-group" style="margin-top: 1.5rem;">
                <button class="btn-login" id="btnSalvar" onclick="salvarNovaSenha()">Salvar Nova Senha</button>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        // Garante que só acessa esta página se estiver logado e com flag ativa
        firebase.auth().onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            // Verifica se realmente precisa trocar a senha
            const doc = await db.collection('usuarios').doc(user.uid).get();
            if (!doc.exists || !doc.data().deveAlterarSenha) {
                window.location.href = 'index.html';
            }
        });

        async function salvarNovaSenha() {
            const nova      = document.getElementById('novaSenha').value;
            const confirmar = document.getElementById('confirmarSenha').value;
            const feedback  = document.getElementById('feedback');
            const btn       = document.getElementById('btnSalvar');

            feedback.style.display = 'none';

            if (nova.length < 6) {
                mostrarFeedback('A senha deve ter pelo menos 6 caracteres.', 'error');
                return;
            }
            if (nova !== confirmar) {
                mostrarFeedback('As senhas não coincidem.', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Salvando...';

            try {
                const user = firebase.auth().currentUser;

                // Atualiza a senha diretamente (usuário já está autenticado via link de reset)
                await user.updatePassword(nova);

                // Remove a flag do Firestore
                await db.collection('usuarios').doc(user.uid).update({
                    deveAlterarSenha: false
                });

                mostrarFeedback('Senha criada com sucesso! Redirecionando...', 'success');
                btn.textContent = 'Salvo ✓';
                setTimeout(() => window.location.href = 'index.html', 2000);

            } catch (error) {
                if (error.code === 'auth/requires-recent-login') {
                    mostrarFeedback('Sessão expirada. Faça login novamente.', 'error');
                    setTimeout(() => {
                        firebase.auth().signOut().then(() => window.location.href = 'login.html');
                    }, 2000);
                } else {
                    mostrarFeedback('Erro ao salvar senha: ' + error.message, 'error');
                }
                btn.disabled = false;
                btn.textContent = 'Salvar Nova Senha';
            }
        }

        function mostrarFeedback(msg, tipo) {
            const el = document.getElementById('feedback');
            el.textContent = msg;
            el.className = 'feedback ' + tipo;
            el.style.display = 'block';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') salvarNovaSenha();
        });
    </script>
</body>
</html>
